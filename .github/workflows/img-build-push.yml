name: Build and push Container image

on:
  workflow_dispatch:
  push:
    branches:
      - 'dev'
    tags:
      - 'v*'

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Login to dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GIT_PKGTOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push linux/amd64
        id: build
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          context: .
          file: ./Dockerfile
          provenance: false
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: |
            wocha/ocpp-cp-admin
            ghcr.io/WoCha-FR/ocpp-cp-admin

      - name: Export digest
        run: |
          mkdir -p /tmp/digests-amd64
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests-amd64/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-amd64
          path: /tmp/digests-amd64/*
          if-no-files-found: error
          retention-days: 1

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Login to dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GIT_PKGTOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push linux/arm64
        id: build
        uses: docker/build-push-action@v7
        with:
          platforms: linux/arm64
          context: .
          file: ./Dockerfile
          provenance: false
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: |
            wocha/ocpp-cp-admin
            ghcr.io/WoCha-FR/ocpp-cp-admin

      - name: Export digest
        run: |
          mkdir -p /tmp/digests-arm64
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests-arm64/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-arm64
          path: /tmp/digests-arm64/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download amd64 digest
        uses: actions/download-artifact@v8
        with:
          name: digests-amd64
          path: /tmp/digests-amd64

      - name: Download arm64 digest
        uses: actions/download-artifact@v8
        with:
          name: digests-arm64
          path: /tmp/digests-arm64

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            wocha/ocpp-cp-admin
            ghcr.io/WoCha-FR/ocpp-cp-admin
          tags: |
            type=ref,event=branch
            type=raw,value={{branch}}-{{date 'YYYYMMDD'}}-{{sha}},enable=${{ github.ref_type == 'branch' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Login to dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GIT_PKGTOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push multi-arch manifest
        run: |
          DIGEST_AMD64=$(ls /tmp/digests-amd64)
          DIGEST_ARM64=$(ls /tmp/digests-arm64)

          # DockerHub
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("wocha/")) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            wocha/ocpp-cp-admin@sha256:${DIGEST_AMD64} \
            wocha/ocpp-cp-admin@sha256:${DIGEST_ARM64}

          # GitHub Container Registry
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("ghcr.io/")) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ghcr.io/WoCha-FR/ocpp-cp-admin@sha256:${DIGEST_AMD64} \
            ghcr.io/WoCha-FR/ocpp-cp-admin@sha256:${DIGEST_ARM64}