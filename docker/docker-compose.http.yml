services:
  ocpp-cp-admin:
    image: ghcr.io/wocha-fr/ocpp-cp-admin:latest
    container_name: ocpp-cp-admin
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9000:9000"
    volumes:
      - config:/app/config
      - logs:/app/logs
      # Uncomment the following line to enable image uploads (e.g. for custom favicon and logos)
      #- public-img:/app/public/img
      # Uncomment the following line to enable custom locales (for translations)
      #- locales-custom:/app/locales-custom
    environment:
      - NODE_ENV=production
      - CPADMIN_HTTP_HOST=0.0.0.0
      # Uncomment to override the default language (any locale from locales/)
      # - CPADMIN_LANGUAGE=en

volumes:
  config:
  logs:
  #public-img:
  #locales-custom:
